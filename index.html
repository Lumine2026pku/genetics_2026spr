tween observed and expected data.", "latex": "\\chi^2 = \\sum \\frac{(O - E)^2}{E}"}, {"conditions": "\u7528\u4e8e\u4e09\u70b9\u6d4b\u4ea4\u5206\u6790\uff0cC=1\u8868\u793a\u65e0\u5e72\u6d89\uff0cC\u003c1\u8868\u793a\u6b63\u5e72\u6d89\u3002", "description_cn": "\u5e76\u53d1\u7cfb\u6570\u516c\u5f0f\uff0c\u6d4b\u91cf\u89c2\u5bdf\u53cc\u4ea4\u6362\u6570\u4e0e\u671f\u671b\u53cc\u4ea4\u6362\u6570\u7684\u6bd4\u503c\u3002", "description_en": "Coefficient of coincidence formula measuring the ratio of observed to expected double crossovers.", "latex": "C = \\frac{\\text{observed DCO}}{\\text{expected DCO}}"}, {"conditions": "I=0\u8868\u793a\u65e0\u5e72\u6d89\uff0cI=1\u8868\u793a\u5b8c\u5168\u5e72\u6d89\uff08\u65e0\u53cc\u4ea4\u6362\uff09\u3002", "description_cn": "\u5e72\u6d89\u516c\u5f0f\uff0c\u6d4b\u91cf\u4e00\u6b21\u4ea4\u6362\u6291\u5236\u53e6\u4e00\u6b21\u4ea4\u6362\u7684\u7a0b\u5ea6\u3002", "description_en": "Interference formula measuring the degree to which one crossover inhibits another.", "latex": "I = 1 - C"}, {"conditions": "\u9002\u7528\u4e8e\u9057\u4f20\u56fe\u8c31\u6784\u5efa\uff0c1%\u91cd\u7ec4\u7387\u5bf9\u5e941 cM\u62161 m.u.\u3002", "description_cn": "\u91cd\u7ec4\u7387\u3001\u5398\u6469\u548c\u56fe\u8ddd\u5355\u4f4d\u4e4b\u95f4\u7684\u6362\u7b97\u3002", "description_en": "Conversion between recombination frequency, centimorgan, and map unit.", "latex": "1\\% RF = 1 \\text{ cM} = 1 \\text{ m.u.}"}, {"conditions": "\u9002\u7528\u4e8e\u771f\u83cc\u56db\u5206\u5b50\u5206\u6790\uff0c\u4e24\u57fa\u56e0\u8fde\u9501\u5224\u65ad\u3002", "description_cn": "\u56db\u5206\u5b50\u5206\u6790\u4e2d\uff0c\u82e5\u4eb2\u4e8c\u578b\u4e0e\u975e\u4eb2\u4e8c\u578b\u6bd4\u503c\u5927\u4e8e1\uff0c\u5219\u4e24\u57fa\u56e0\u8fde\u9501\u3002", "description_en": "In tetrad analysis, if the ratio of parental ditype to nonparental ditype is greater than 1, the two genes are linked.", "latex": "PD/NPD \u003e 1 \\implies \\text{linked}"}, {"conditions": "\u9002\u7528\u4e8e\u771f\u83cc\u56d u522b\u3002", "\u51cf\u6570\u5206\u88c2\u4e0e\u6709\u4e1d\u5206\u88c2\u7684\u533a\u522b\uff1a\u51cf\u6570\u5206\u88c2\u53d1\u751f\u5728\u751f\u6b96\u7ec6\u80de\uff0c\u67d3\u8272\u4f53\u590d\u5236\u4e00\u6b21\u3001\u7ec6\u80de\u5206\u88c2\u4e24\u6b21\uff0c\u4ea7\u751f\u56db\u4e2a\u5355\u500d\u4f53\u914d\u5b50\uff1b\u6709\u4e1d\u5206\u88c2\u53d1\u751f\u5728\u4f53\u7ec6\u80de\uff0c\u4ea7\u751f\u4e24\u4e2a\u4e8c\u500d\u4f53\u5b50\u7ec6\u80de\u3002", "\u4ea4\u53c9\u9057\u4f20\uff1a\u6027\u8fde\u9501\u6027\u72b6\u4ece\u7236\u4eb2\u4f20\u7ed9\u5973\u513f\u3001\u4ece\u6bcd\u4eb2\u4f20\u7ed9\u513f\u5b50\uff0c\u5982\u679c\u8747\u767d\u773c\u57fa\u56e0\u7684X\u8fde\u9501\u9057\u4f20\u3002", "\u4e0d\u5206\u79bb\u73b0\u8c61\uff1a\u51cf\u6570\u5206\u88c2\u4e2d\u67d3\u8272\u4f53\u672a\u5206\u79bb\u5bfc\u81f4\u914d\u5b50\u67d3\u8272\u4f53\u6570\u76ee\u5f02\u5e38\uff0c\u5982Bridges\u5b9e\u9a8c\u8bc1\u660e\u57fa\u56e0\u4f4d\u4e8e\u7279\u5b9a\u67d3\u8272\u4f53\u4e0a\u3002", "\u8fde\u9501\u57fa\u56e0\u4e0d\u72ec\u7acb\u5206\u914d\uff0c\u91cd\u7ec4\u7387\u5c0f\u4e8e50%\u662f\u8fde\u9501\u7684\u8bca\u65ad\u6807\u51c6\u3002", "\u5361\u65b9\u68c0\u9a8c\u7528\u4e8e\u5224\u65ad\u89c2\u5bdf\u6570\u636e\u662f\u5426\u663e\u8457\u504f\u79bb\u65e0\u8fde\u9501\u7684\u671f\u671b\u6bd4\u4f8b\uff081:1:1:1\uff09\u3002", "\u4e09\u70b9\u6d4b\u4ea4\u53ef\u540c\u65f6\u786e\u5b9a\u4e09\u4e2a\u57fa\u56e0\u7684\u987a\u5e8f\u548c\u8ddd\u79bb\uff0c\u53cc\u4ea4\u6362\u5b50\u4ee3\u6700\u5c11\uff0c\u7528\u4e8e\u63a8\u65ad\u4e2d\u95f4\u57fa\u56e0\u3002", "\u5e76\u53d1\u7cfb\u6570C\u548c\u5e72\u6d89I\u8861\u91cf\u53cc\u4ea4\u6362\u7684\u72ec\u7acb\u6027\uff0cI=1-C\uff0cI=0\u8868\u793a\u65e0\u5e72\u6d89\u3002", "\u9057\u4f20\u56fe\u8c31\u57fa\u4e8e\u91cd\u7ec4\u7387\u6784\u5efa\uff0c\u4f46\u7269\u7406\u8ddd\u79bb\u4e0e\u9057\u4f20\u8ddd\u79bb\u53ef\u80fd\u4e0d\u4e00\u81f4\uff0c\u56e0\u53cc\u4ea4\u6362\u548c\u91cd\u7ec4\u7387\u4e0a\u965050%\u3002", "\u8fde\u9501\u4e0e\u91cd\u7ec4\u7684\u610f\u4e49\uff1a\u8fde\u9501\u4fdd\u6301\u6709\u5229\u57fa\u56e0\u7ec4\u5408\uff0c\u91cd\u7ec4\u4ea7\u751f\u65b0\u7ec4\u5408\u4ee5\u9002\u5e94\u73af\u5883\u53d8\u5316\u3002", "\u56db\u5206\u5b50\u5206\u6790\u4e2d\uff0cPD/NPD \u003e 1 \u8868\u793a\u8fde\u9501\uff0cPD/NPD = 1 \u8868\u793a\u4e0d\u8fde\u9501\uff1b\u91cd\u7ec4\u53d1\u751f\u5728\u56db\u7ebf\u9636\u6bb5\u3002", "\u6709\u4e1d\u5206\u88c2\u91cd\u7ec4\u7f55\u89c1\uff08~10^-6\uff09\uff0c\u53ef\u4ea7\u751f\u5b6a\u751f\u6591\u548c\u9057\u4f20\u9576\u5d4c\u4f53\uff0c\u7528\u4e8e\u53d1\u80b2\u7814\u7a76\u548c\u764c\u75c7\u673a\u5236\u3002", "\u540c\u6e90\u91cd\u7ec4\u901a\u8fc7\u53cc\u94fe\u65ad\u88c2\u6a21\u578b\u8fdb\u884c\uff0c\u5305\u62ec\u65ad\u88c2\u3001\u5207\u9664\u3001\u94fe\u5165\u4fb5\u3001Holliday\u8fde\u63a5\u4f53\u5f62\u6210\u548c\u5206\u652f\u8fc1\u79fb\u3002", "\u57fa\u56e0\u8f6c\u53d8\u662f\u975e\u4ea4\u4e92\u91cd\u7ec4\uff0c\u7531\u5f02\u6e90\u53cc\u94feDNA\u7684\u9519\u914d\u4fee\u590d\u5f15\u8d77\uff0c\u9891\u7387\u9ad8\u4e8e\u7a81\u53d8\uff0c\u5e38\u4f34\u968f\u4fa7\u7ffc\u6807\u8bb0\u7684\u4ea4\u4e92\u91cd\u7ec4\u3002"], "summary_cn": "\u67d3\u8272\u4f53\u9057\u4f20\u7406\u8bba\u5c06\u67d3\u8272\u4f53\u786e\u5b9a\u4e3a\u9057\u4f20\u7269\u8d28\u7684\u8f7d\u4f53\uff0c\u57fa\u56e0\u5728\u67d3\u8272\u4f53\u4e0a\u5448\u7ebf\u6027\u6392\u5217\uff0c\u4f4d\u4e8e\u7279\u5b9a\u57fa\u56e0\u5ea7\u3002\u8be5\u7406\u8bba\u901a\u8fc7\u51cf\u6570\u5206\u88c2\u4e2d\u540c\u6e90\u67d3\u8272\u4f53\u7684\u884c\u4e3a\uff08\u4e00\u6761\u6765\u81ea\u7236\u65b9\uff0c\u4e00\u6761\u6765\u81ea\u6bcd\u65b9\uff09\u89e3\u91ca\u4e86\u5b5f\u5fb7\u5c14\u9057\u4f20\u3002\u6027\u67d3\u8272\u4f53\u51b3\u5b9a\u6027\u522b\uff08\u4eba\u7c7b\u5973\u6027XX\uff0c\u7537\u6027XY\uff09\uff0c\u5e38\u67d3\u8272\u4f53\u4e3a\u5176\u4f59\u67d3\u8272\u4f53\u5bf9\u3002\u5173\u952e\u8fc7\u7a0b\u5305\u62ec\u4ea4\u6362\uff08\u4ea7\u751f\u65b0\u7684\u7b49\u4f4d\u57fa\u56e0\u7ec4\u5408\uff09\u548c\u4e0d\u5206\u79bb\uff08\u5bfc\u81f4\u67d3\u8272\u4f53\u6570\u76ee\u5f02\u5e38\uff09\u3002\u4ea4\u53c9\u9057\u4f20\u63cf\u8ff0\u4e86\u6027\u8fde\u9501\u6027\u72b6\u7684\u4f20\u9012\u6a21\u5f0f\uff0c\u5982\u679c\u8747\u767d\u773c\u57fa\u56e0\u4ece\u7236\u4eb2\u4f20\u7ed9\u5973\u513f\u3001\u4ece\u6bcd\u4eb2\u4f20\u7ed9\u513f\u5b50\u3002\u8fde\u9501\u5206\u6790\u8868\u660e\uff0c\u8fde\u9501\u57fa\u56e0\u4e0d\u72ec\u7acb\u5206\u914d\uff0c\u91cd\u7ec4\u7387\u4f4e\u4e8e50%\u662f\u8fde\u9501\u7684\u8bca\u65ad\u6807\u51c6\u3002\u5361\u65b9\u68c0\u9a8c\u7528\u4e8e\u5224\u65ad\u89c2\u5bdf\u6570\u636e\u662f\u5426\u504f\u79bb\u671f\u671b\u6bd4\u4f8b\uff0c\u4e09\u70b9\u6d4b\u4ea4\u53ef\u540c\u65f6\u786e\u5b9a\u4e09\u4e2a\u57fa\u56e0\u7684\u987a\u5e8f\u548c\u8ddd\u79bb\uff0c\u53cc\u4ea4\u6362\u5b50\u4ee3\u6700\u5c11\u7528\u4e8e\u63a8\u65ad\u4e2d\u95f4\u57fa\u56e0\u3002\u5e76\u53d1\u7cfb\u6570C\u548c\u5e72\u6d89I\u8861\u91cf\u53cc\u4ea4\u6362\u7684\u72ec\u7acb\u6027\uff0c\u9057\u4f20\u56fe\u8c31\u57fa\u4e8e\u91cd\u7ec4\u7387\u6784\u5efa\uff0c\u4f46\u53ef\u80fd\u56e0\u53cc\u4ea4\u6362\u548c\u91cd\u7ec4\u7387\u4e0a\u965050%\u800c\u4e0e\u7269\u7406\u8ddd\u79bb\u4e0d\u4e00\u81f4\u3002", "summary_en": "The Chromosome Theory of Inheritance establishes chromosomes as the carriers of genetic material, with genes arranged linearly at specific loci. This theory explains Mendelian inheritance through the behavior of homologous chromosomes during meiosis, where one set comes from each parent. Sex determination is governed by sex chromosomes (XX in females, XY in males in humans), while autosomes constitute the remaining pairs. Key processes include crossing-over, which generates new allele combinations, and nondisjunction, which leads to abnormal chromosome numbers. Crisscross inheritance describes the transmission of sex-linked traits, such as the white-eye gene in Drosophila, from father to daughter and mother to son. Linkage analysis reveals that linked genes do not assort independently, with recombination rates below 50% indicating linkage. The chi-square test assesses deviations from expected ratios in test crosses, while three-point test crosses determine gene order and distances, using double crossover progeny to infer the middle gene. The coefficient of coincidence and interference measure the independence of double crossovers, and genetic maps based on recombination rates may differ from physical distances due to double crossovers and the 50% recombination ceiling.", "title_cn": "\u9057\u4f20\u7684\u67d3\u8272\u4f53\u7406\u8bba\u4e0e\u8fde\u9501\u5206\u6790", "title_en": "Chromosome Theory of Inheritance and Linkage Analysis"}, {"concepts": [{"definition_cn": "\u57fa\u56e0\u662fDNA\u4e2d\u4e00\u7ec4\u79bb\u6563\u7684\u7ebf\u6027\u6838\u82f7\u9178\u5bf9\uff0c\u4f5c\u4e3a\u529f\u80fd\u5355\u4f4d\uff0c\u7f16\u7801\u7279\u5b9a\u7684RNA\u6216\u86cb\u767d\u8d28\uff1b\u662f\u9057\u4f20\u7684\u57fa\u672c\u7269\u7406\u548c\u529f\u80fd\u5355\u4f4d\u3002", "definition_en": "A discrete linear set of nucleotide pairs in DNA that serves as a unit of function by encoding a particular RNA or protein; the fundamental physical and functional unit of heredity.", "formulas": [], "name_cn": "\u57fa\u56e0", "name_en": "Gene"}, {"definition_cn": "\u4e00\u79cd\u9057\u4f20\u68c0\u6d4b\u65b9\u6cd5\uff0c\u901a\u8fc7\u89c2\u5bdf\u643a\u5e26\u4e24\u4e2a\u7a81\u53d8\u7684\u5b50\u4ee3\u662f\u5426\u8868\u73b0\u91ce\u751f\u578b\u8868\u578b\uff0c\u6765\u5224\u65ad\u8fd9\u4e24\u4e2a\u7a81\u53d8\u53d1\u751f\u5728\u540c\u4e00\u57fa\u56e0\u8fd8\u662f\u4e0d\u540c\u57fa\u56e0\u3002", "definition_en": "A genetic test to determine whether two mutations occur in the same gene or different genes by observing if offspring carrying both mutations show wild-type phenotype.", "formulas": [], "name_cn": "\u4e92\u8865\u68c0\u6d4b", "name_en": "Complementation test"}, {"definition_cn": "\u4e00\u6bb5\u53ef\u4ee5\u4ece\u57fa\u56e0\u7ec4\u7684\u4e00\u4e2a\u4f4d\u7f6e\u79fb\u52a8\u5230\u53e6\u4e00\u4e2a\u4f4d\u7f6e\u7684DNA\u7247\u6bb5\uff0c\u901a\u5e38\u901a\u8fc7\u8f6c\u5ea7\u6 mutations affect the same gene or different genes, while intragenic recombination, demonstrated by Benzer in T4 phage, proved that genes are not indivisible units. The central dogma describes the flow of genetic information from DNA to RNA to protein. Transposable elements (TEs) such as P elements in Drosophila and Alu sequences in humans can move within the genome via DNA transposition or retrotransposition, impacting genome stability and causing hybrid dysgenesis or genetic diseases. The chapter also frames cancer as a microevolutionary process where mutations confer selective advantages, leading to uncontrolled cell proliferation. Hallmarks of cancer include evasion of growth control, replicative immortality, genomic instability, and metastasis. Oncogenes act dominantly through gain-of-function mutations, while tumor suppressor genes (e.g., Rb, p53) act recessively via loss-of-function mutations. Cell cycle checkpoints, regulated by CDK-cyclin complexes, maintain genomic integrity, with p53 acting as a guardian. Personalized cancer therapy targets specific driver mutations using drugs like Gleevec and Herceptin, alongside traditional treatments and immunotherapy, acknowledging tumor heterogeneity.", "title_cn": "\u57fa\u56e0\u548c\u7a81\u53d8\u7684\u6982\u5ff5", "title_en": "Concepts of Genes and Mutations"}, {"concepts": [{"definition_cn": "\u975e\u540c\u6e90\u67d3\u8272\u4f53\u4e4b\u95f4\u76f8\u4e92\u4ea4\u6362\u7247\u6bb5\uff0c\u4ea7\u751f\u5e73\u8861\u91cd\u6392\u3002", "definition_en": "A two-way exchange of segments between nonhomologous chromosomes, resulting in a balanced rearrangement.", "formulas": [], "name_cn": "\u76f8\u4e92\u6613\u4f4d", "name_en": "Reciprocal translocation"}, {"definition_cn": "\u8fd1\u7aef\u7740\u4e1d\u7c92\u67d3\u8272\u4f53\u5728\u7740\u4e1d\u7c92\u5904\u6216\u9644\u8fd1\u4ea4\u6362\uff0c\u4ea7\u751f\u5927\u7684\u4e2d\u7740\u4e1d\u7c92\u67d3\u8272\u4f53\u548c\u53ef\u80fd\u4e22\u5931\u7684\u5c0f\u7247\u6bb5\u3002", "definition_en": man Genome Project (HGP) employed a hierarchical shotgun approach, while Celera used whole-genome shotgun sequencing, highlighting different strategies. Restriction endonucleases, which recognize palindromic sequences and produce sticky or blunt ends, are essential for DNA manipulation, with average fragment length determined by 4^n. Gel electrophoresis separates DNA by size, and molecular cloning involves restriction digestion, ligation, transformation, and blue-white screening via lacZ insertion. PCR amplifies DNA through denaturation, annealing, and extension cycles using heat-stable Taq polymerase. Genomic and cDNA libraries, often using BAC vectors for large inserts, facilitate gene discovery and functional studies.", "title_cn": "\u57fa\u56e0\u7ec4\u5206\u6790", "title_en": "Genome Analysis"}, {"concepts": [{"definition_cn": "\u7f3a\u4e4f\u660e\u786e\u6838\u819c\u548c\u819c\u7ed3\u5408\u7ec6\u80de\u5668\u7684\u5355\u7ec6\u80de\u751f\u7269\uff1b\u5178\u578b\u7684\u7ec6\u83cc\u67d3\u8272\u4f53\u662f\u73af\u72b6\u7684\u3002", "definition_en": "A unicellular organism lacking a defined nuclear membrane and membrane-bounded organelles; typical bacterial chromosomes are circular.", "formulas": [], "name_cn": "\u539f\u6838\u751f\u7269", "name_en": "Prokaryote"}, {"definition_cn": "\u80fd\u5728\u57fa\u672c\u57f9\u517b\u57fa\u4e0a\u751f\u957f\u7684\u91ce\u751f\u578b\u7ec6\u83cc\uff0c\u80fd\u4ece\u57fa\u672c\u6210\u5206\u5408\u6210\u6240\u6709\u5fc5\u9700\u8425\u517b\u7269\u8d28\u3002", "definition_en": "A wild-type bacterium that can grow on minimal medium, synthesizing all required nutrients from basic components.", "formulas": [], "name_cn": "\u539f\u517b\u578b", "name_en": "Prototroph"}, {"definition_cn": "\u7a81\u53d8\u578b\u7ec6\u83cc\uff0c\u9664\u57fa\u672c\u57f9\u517b\u57fa\u5916\u8fd8\u9700\u8981\u4e00\u79cd\u6216\u591a\u79cd\u7279\u5b9a\u8425\u517b\u7269\u8d28\uff08\u5982\u6c28\u57fa\u9178\u3001\u6838\u82f7\u9178\uff09\u624d\u80fd\u751f\u957f\u3002", "definitio t that can be far from the gene, binding activators or repressors to increase or decrease basal transcription levels.", "formulas": [], "name_cn": "\u589e\u5f3a\u5b50", "name_en": "Enhancer"}, {"definition_cn": "\u53cd\u5f0f\u4f5c\u7528\u86cb\u767d\uff0c\u7ed3\u5408\u589e\u5f3a\u5b50\u5e76\u901a\u8fc7\u4e0e\u57fa\u7840\u56e0\u5b50\u76f8\u4e92\u4f5c\u7528\u6216\u6539\u53d8\u67d3\u8272\u8d28\u7ed3\u6784\u6765\u523a\u6fc0\u8f6c\u5f55\u3002", "definition_en": "A trans-acting protein that binds to enhancers and stimulates transcription by interacting with basal factors or altering chromatin structure.", "formulas": [], "name_cn": "\u6fc0\u6d3b\u5b50", "name_en": "Activator"}, {"definition_cn": "\u901a\u8fc7\u7ade\u4e89\u6fc0\u6d3b\u5b50\u3001\u963b\u65adRNA pol II\u8fdb\u5165\u6216\u62db\u52df\u5171\u6291\u5236\u5b50\u6765\u6291\u5236\u8f6c\u5f55\u7684\u86cb\u767d\u8d28\u3002", "definition_en": "A protein that suppresses transcription by competing with activators, blocking RNA pol II access, or recruiting corepressors.", "formulas": [], "name_cn": "\u6291\u5236\u5b50", "name_en": "Repressor"}, {"definition_cn": "\u4ece\u540c\u4e00\u521d\u7ea7\u8f6c\u5f55\u672c\u526a\u63a5\u4e0d\u540c\u5916\u663e\u5b50\u7ec4\u5408\u7684\u8fc7\u7a0b\uff0c\u4ece\u5355\u4e2a\u57fa\u56e0\u4ea7\u751f\u591a\u79cdmRNA\u548c\u86cb\u767d\u8d28\u4e9a\u578b\u3002", "definition_en": "A process where different combinations of exons are spliced from the same primary transcript, producing multiple mRNA and protein isoforms from a single gene.", "formulas": [], "name_cn": "\u53ef\u53d8\u526a\u63a5", "name_en": "Alternative splicing"}, {"definition_cn": "\u7531snRNP\uff08U1\u3001U2\u3001U4\u3001U5\u3001U6\uff09\u7ec4\u6210\u7684\u590d\u5408\u7269\uff0c\u901a\u8fc7\u53bb\u9664\u5185\u542b\u5b50\u5e76\u8fde\u63a5\u5916\u663e\u5b50\u50ac\u5316\u524dmRNA\u526a\u63a5\u3002", "definition_en": "A complex of snRNPs (U1, U2, U4, U5, U6) that catalyzes pre-mRNA splicing by removing introns and joining exons.", "formulas": [], "name_cn": "\u526a\u63a5\u4f53", "name_en": "Spliceosome"}, {"definition_cn": "\u5c0f\uff08~22 nt\uff09\u975e\u7f16\u7801RNA\uff0c\u901a\u8fc7\u7ed3\u5408\u9776mRNA\u5728\u8f6c\u5f55\u540e\u8c03\u63a7\u57fa\u56e0\u8868\u8fbe\uff0c\u6291\u5236\u7ffb\u8bd1\u6216\u4fc3\u8fdb\u964d\u89e3\u3002", "definition_en": "Small (~22 nt) non-coding RNA that regulates gene expression post-transcriptionally by binding to target mRNAs, inhibiting translation or promoting degradation.", "formulas": [], "name_cn": "\u5fae\u5c0fRNA", "name_en": "miRNA (microRNA)"}, {"definition_cn": "\u5c0f\uff0820-22 nt\uff09\u53cc\u94feRNA\uff0c\u4ecb\u5bfcRNA\u5e72\u6270\uff0c\u5f15\u5bfcRISC\u5207\u5272\u4e92\u8865mRNA\u3002", "definition_en": "Small (20-22 nt) double-stranded RNA that mediates RNA interference, guiding RISC to cleave complementary mRNA.", "formulas": [], "name_cn": "\u5c0f\u5e72\u6270RNA", "name_en": "siRNA (small interfering RNA)"}, {"definition_cn": "\u5728\u751f\u6b96\u7cfb\u4e2d\u8868\u8fbe\u7684\u5c0f\uff0824-30 nt\uff09RNA\uff0c\u6765\u6e90\u4e8e\u8f6c\u5ea7\u5b50\u7c07\uff0c\u901a\u8fc7\u4e52\u4e53\u6a21\u578b\u6c89\u9ed8\u8f6c\u5ea7\u5b50\u3002", "definition_en": "Small (24-30 nt) RNA expressed in germlines, derived from transposable element clusters, that silences TEs via the Ping-Pong model.", "formulas": [], "name_cn": "Piwi\u76f8\u4e92\u4f5c\u7528RNA", "name_en": "piRNA (Piwi-interacting RNA)"}, {"definition_cn": "\u679c\u8747\u4e2dX\u67d3\u8272\u4f53\u4e0e\u5e38\u67d3\u8272\u4f53\u7684\u6bd4\u7387\uff0c\u51b3\u5b9a\u6027\u522b\u3001\u751f\u80b2\u529b\u548c\u5242\u91cf\u8865\u507f\u3002", "definition_en": "The ratio of X chromosomes to autosomes in Drosophila, which determines sex, fertility, and dosage compensation.", "formulas": [], "name_cn": "X:A\u6bd4\u7387", "name_en": "X:A ratio"}, {"definition_cn": "\u679c\u8747\u4e2dP\u96c4\u6027\u00d7M\u96cc\u6027\u6742\u4ea4\u540e\u4ee3\u56e0\u7f3a\u4e4fpiRNA\u6291\u5236\u5bfc\u81f4P\u5143\u4ef6\u8f6c\u5ea7\u800c\u5f15\u8d77\u4e0d\u80b2\u7684\u7efc\u5408\u5f81\u3002", "definition_en": "A syndrome in Drosophila where P-element transposition in offspring of P-male x M-female crosses causes sterility due to lack of piRNA repression.", "formulas": [], "name_cn": "\u6742\u79cd\u8d25\u80b2", "name_en": "Hybrid dysgenesis"}, {"definition_cn": "\u4e00\u79cd\u57fa\u56e0\u6c89\u9ed8\u673a\u5236\uff0c\u53cc\u94feRNA\u88ab\u52a0\u5de5\u6210siRNA\uff0c\u5f15\u5bfcRISC\u964d\u89e3\u4e92\u8865mRNA\u3002", "definition_en": "A gene silencing mechanism where double-stranded RNA is processed into siRNAs that guide RISC to degrade complementary mRNA.", "formulas": [], "name_cn": "RNA\u5e72\u6270", "name_en": "RNA interference (RNAi)"}, {"definition_cn": "\u679c\u8747\u96c4\u6027\u4e2d\u589e\u52a0X\u8fde\u9501\u57fa\u56e0\u8f6c\u5f55\u4ee5\u5e73\u8861\u4e0e\u96cc\u6027\u8868\u8fbe\u6c34\u5e73\u7684\u673a\u5236\u3002", "definition_en": "A mechanism in Drosophila males that increases transcription of X-linked genes to equalize expression with females.", "formulas": [], "name_cn": "\u5242\u91cf\u8865\u507f", "name_en": "Dosage compensation"}], "formulas": [], "id": 7, "key_points": ["\u771f\u6838\u751f\u7269\u57fa\u56e0\u8868\u8fbe\u8c03\u63a7\u6bd4\u539f\u6838\u590d\u6742\uff1a\u6709\u7ec6\u80de\u6838\u3001\u5185\u542b\u5b50\u3001\u7ec4\u86cb\u767d\uff0c\u8f6c\u5f55\u548c\u7ffb\u8bd1\u5728\u7a7a\u95f4\u4e0a\u5206\u79bb\u3002", "RNA\u805a\u5408\u9176II\u8f6c\u5f55\u6240\u6709\u86cb\u767d\u7f16\u7801\u57fa\u56e0\uff0c\u9700\u8981\u542f\u52a8\u5b50\uff08\u542bTATA\u76d2\uff09\u548c\u589e\u5f3a\u5b50\u7b49\u987a\u5f0f\u5143\u4ef6\uff0c\u4ee5\u53ca\u8f6c\u5f55\u56e0\u5b50\u7b49\u53cd\u5f0f\u56e0\u5b50\u3002", "\u53ef\u53d8\u526a\u63a5\u662f\u91cd\u8981\u7684\u8f6c\u5f55\u540e\u8c03\u63a7\u65b9\u5f0f\uff0c\u4e00\u4e2a\u57fa\u56e0\u53ef\u4ea7\u751f\u591a\u79cdmRNA\u548c\u86cb\u767d\u8d28\u4e9a\u578b\uff0c\u5982Dscam\u57fa\u56e0\u53ef\u7f16\u780138016\u79cd\u86cb\u767d\u3002", "\u679c\u8747\u6027\u522b\u51b3\u5b9a\u7531X:A\u6bd4\u7387\u8c03\u63a7\uff0c\u901a\u8fc7Sxl\u3001tra\u3001dsx\u7b49\u57fa\u56e0\u7684\u53ef\u53d8\u526a\u63a5\u7ea7\u8054\u53cd\u5e94\u5b9e\u73b0\u3002", "\u5c0fRNA\uff08miRNA\u3001siRNA\u3001piRNA\uff09\u5728\u8f6c\u5f55\u540e\u548c\u8868\u89c2\u9057\u4f20\u6c34\u5e73\u8c03\u63a7\u57fa\u56e0\u8868\u8fbe\uff0cpiRNA\u4f5c\u4e3a\u9002\u5e94\u6027\u514d\u75ab\u7cfb\u7edf\u6291\u5236\u8f6c\u5ea7\u5b50\u3002"], "summary_cn": "\u771f\u6838\u751f\u7269\u57fa\u56e0\u8868\u8fbe\u5305\u62ec\u7ec6\u80de\u6838\u5185\u7684\u8f6c\u5f55\u3001RNA\u52a0\u5de5\u548c\u7ec6\u80de\u8d28\u4e2d\u7684\u7ffb\u8bd1\uff0c\u5176\u8c03\u63a7\u6bd4\u539f\u6838\u751f\u7269\u66f4\u590d\u6742\uff0c\u6d89\u53ca\u542f\u52a8\u5b50\uff08\u5982TATA\u76d2\uff09\u3001\u589e\u5f3a\u5b50\u7b49\u987a\u5f0f\u5143\u4ef6\u4ee5\u53ca\u6fc0\u6d3b\u5b50\u548c\u6291\u5236\u5b50\u7b49\u53cd\u5f0f\u56e0\u5b50\u3002RNA\u805a\u5408\u9176II\u8f6c\u5f55\u6240\u6709\u86cb\u767d\u8d28\u7f16\u7801\u57fa\u56e0\uff0c\u800c\u53ef\u53d8\u526a\u63a5\u4f7f\u5355\u4e2a\u57fa\u56e0\u80fd\u4ea7\u751f\u591a\u79cdmRNA\u548c\u86cb\u767d\u8d28\u4e9a\u578b\uff0c\u4f8b\u5982\u679c\u8747\u7684Dscam\u57fa\u56e0\u53ef\u7f16\u7801\u8d85\u8fc738000\u79cd\u86cb\u767d\u3002\u5c0fRNA\u5982miRNA\u548csiRNA\u901a\u8fc7\u7ed3\u5408\u9776mRNA\u5728\u8f6c\u5f55\u540e\u6c34\u5e73\u8c03\u63a7\u57fa\u56e0\u8868\u8fbe\uff0cpiRNA\u5219\u4f5c\u4e3a\u9002\u5e94\u6027\u514d\u75ab\u7cfb\u7edf\u6291\u5236\u8f6c\u5ea7\u5b50\u3002", "summary_en": "Eukaryotic gene expression involves transcription in the nucleus, RNA processing, and translation in the cytoplasm, regulated by complex mechanisms including promoters (e.g., TATA box), enhancers, and trans-acting factors like activators and repressors. RNA polymerase II transcribes all protein-coding genes, while alternative splicing allows a single gene to produce multiple mRNA and protein isoforms, as exemplified by the Dscam gene in Drosophila, which can generate over 38,000 variants. Small non-coding RNAs such as miRNA and siRNA regulate gene expression post-transcriptionally by binding to target mRNAs, and piRNAs act as an adaptive immune system to suppress transposons.", "title_cn": "\u771f\u6838\u751f\u7269\u9057\u4f20\u5206\u6790", "title_en": "Genetics Analysis of Eukaryotes"}, {"concepts": [{"definition_cn": "\u7ea622\u4e2a\u6838\u82f7\u9178\u7684\u5c0f\u975e\u7f16\u7801RNA\uff0c\u901a\u8fc7\u7ed3\u5408\u9776mRNA\u6291\u5236\u7ffb\u8bd1\u6216\u4fc3\u8fdb\u964d\u89e3\u6765\u8c03\u63a7\u57fa\u56e0\u8868\u8fbe\u3002", "definition_en": "Small non-coding RNA (~22 nt) that regulates gene expression by binding to target mRNA, inhibiting translation or promoting degradation.", "formulas": [], "name_cn": "\u5fae\u5c0fRNA", "name_en": "miRNA"}, {"definition_cn": "\u6765\u6e90\u4e8e\u53cc\u94feRNA\u7684\u5c0fRNA\uff0820-22 nt\uff09\uff0c\u5f15\u5bfcRISC\u5207\u5272\u4e92\u8865mRNA\uff0c\u53c2\u4e0eRNA\u5e72\u6270\u3002", "definition_en": "Small RNA (20-22 nt) derived from double-stranded RNA, guiding RISC to cleave complementary mRNA in RNA interference.", "formulas": [], "name_cn": "\u5c0f\u5e72\u6270RNA", "name_en": "siRNA"}, {"definition_cn": "\u5728\u751f\u6b96\u7cfb\u4e2d\u8868\u8fbe\u768424-30 nt\u5c0fRNA\uff0c\u901a\u8fc7\u4e52\u4e53\u6a21\u578b\u6291\u5236\u8f6c\u5ea7\u5143\u4ef6\u3002", "definition_en": "Small RNA (24-30 nt) expressed in germline, repressing transposable elements via the Ping-Pong model.", "formulas": [], "name_cn": "Piwi\u76f8\u4e92\u4f5c\u7528RNA", "name_en": "piRNA"}, {"definition_cn": "\u4e0d\u6539\u53d8DNA\u5e8f\u5217\u7684\u53ef\u9057\u4f20\u8868\u578b\u53d8\u5316\uff0c\u6d89\u53ca\u67d3\u8272\u8d28\u4fee\u9970\u3001DNA\u7532\u57fa\u5316\u7b49\u3002", "definition_en": "Stably inherited phenotype changes without DNA sequence alterations, involving chromatin modifications, DNA methylation, etc.", "formulas": [], "name_cn": "\u8868\u89c2\u9057\u4f20\u5b66", "name_en": "Epigenetics"}, {"definition_cn": "\u7ec4\u86cb\u767d\u5c3e\u90e s the process from embryo to adult to death, exposing genotypes to natural selection. The thrifty gene hypothesis, proposed by James Neel in 1962, suggests that genetic variants promoting energy storage during food scarcity increase obesity and diabetes risk in modern high-calorie environments. Developmental genetics uses model organisms like yeast, Arabidopsis, fruit flies, nematodes, and mice to study how a fertilized egg develops into an adult, analyzing mutations that cause developmental abnormalities to understand normal gene control of cell growth, differentiation, and organ formation. Key concepts include loss-of-function mutations (null, hypomorphic, conditional) and gain-of-function mutations (hypermorphic, neomorphic, antimorphic), which are crucial for genetic analysis. Haplosufficiency and haploinsufficiency describe whether one wild-type allele is sufficient for normal development. The Pax6 gene, a conserved transcription factor, is essential for eye development across species, with mutations causing aniridia and eye defects.", "title_cn": "\u57fa\u56e0\u529f\u80fd\u4e0e\u53d1\u80b2", "title_en": "Gene function and development"}, {"concepts": [{"definition_cn": "\u8fdb\u5316\u751f\u7269\u5b66\u7684\u4e00\u4e2a\u5206\u652f\uff0c\u7814\u7a76\u7fa4\u4f53\u4e2d\u7b49\u4f4d\u57fa\u56e0\u9891\u7387\u7684\u53d8\u5316\uff0c\u53d7\u7a81\u53d8\u3001\u81ea\u7136\u9009\u62e9\u3001\u9057\u4f20\u6f02\u53d8\u548c\u57fa\u56e0\u6d41\u7684\u5f71\u54cd\u3002", "definition_en": "A subdiscipline of evolutionary biology studying changes in allele frequencies in populations, influenced by mutation, natural selection, genetic drift, and gene flow.", "formulas": [], "name_cn": "\u7fa4\u4f53\u9057\u4f20\u5b66", "name_en": "Population Genetics"}, {"definition_cn": "\u4e00\u4e2a\u539f\u7406\uff0c\u5728\u7406\u60f3\u6761\u4ef6\u4e0b\uff08\u65e0\u7a81\u53d8\u3001\u8fc1\u79fb\u3001\u9009\u62e9\u6216\u9057\u4f20\u6f02\u53d8\uff0c\u968f\u673a\u4ea4\u914d\uff0c\u5927\u7fa4\u4f53\uff09\u 981\u6821\u6b63\u591a\u91cd\u66ff\u6362\u3002", "description_cn": "\u975e\u540c\u4e49\u66ff\u6362\u7387\u4e0e\u540c\u4e49\u66ff\u6362\u7387\u7684\u6bd4\u503c\uff0c\u7528\u4e8e\u63a8\u65ad\u9009\u62e9\uff1a=1\u4e2d\u6027\uff0c\u003e1\u6b63\u9009\u62e9\uff0c\u003c1\u7eaf\u5316\u9009\u62e9\u3002", "description_en": "Ratio of non-synonymous to synonymous substitution rates, used to infer selection: =1 neutral, \u003e1 positive, \u003c1 purifying.", "latex": "Ka/Ks"}], "id": 11, "key_points": ["\u7fa4\u4f53\u9057\u4f20\u5b66\u6838\u5fc3\uff1a\u7b49\u4f4d\u57fa\u56e0\u9891\u7387\u53d8\u5316\u7531\u7a81\u53d8\u3001\u9009\u62e9\u3001\u6f02\u53d8\u548c\u57fa\u56e0\u6d41\u9a71\u52a8\uff0c\u54c8\u8fea-\u6e29\u4f2f\u683c\u5e73\u8861\u662f\u96f6\u5047\u8bbe\u3002", "\u4e2d\u6027\u7406\u8bba\uff1a\u5927\u591a\u6570\u5206\u5b50\u8fdb\u5316\u7531\u4e2d\u6027\u7a81\u53d8\u7684\u968f\u673a\u56fa\u5b9a\u5f15\u8d77\uff0c\u9057\u4f20\u6f02\u53d8\u662f\u4e3b\u8981\u529b\u91cf\uff1b\u8fd1\u4e2d\u6027\u7406\u8bba\u8003\u8651\u8f7b\u5fae\u6709\u5bb3/\u6709\u5229\u7a81\u53d8\u3002", "Ka/Ks\u6bd4\u503c\uff1aKa/Ks=1\u4e2d\u6027\uff0c\u003e1\u6b63\u9009\u62e9\uff0c\u003c1\u7eaf\u5316\u9009\u62e9\uff1b\u7528\u4e8e\u68c0\u6d4b\u57fa\u56e0\u662f\u5426\u53d7\u9009\u62e9\u3002", "\u4eba\u7c7b\u8fdb\u5316\uff1a\u7ebf\u7c92\u4f53\u590f\u5a03\u7ea620\u4e07\u5e74\u524d\uff0c\u73b0\u4ee3\u4eba\u7c7b\u7ea66\u4e07\u5e74\u524d\u8d70\u51fa\u975e\u6d32\uff0c\u4e0e\u5c3c\u5b89\u5fb7\u7279\u4eba\uff081-4%\u57fa\u56e0\u8d21\u732e\uff09\u548c\u4e39\u5c3c\u7d22\u74e6\u4eba\u6742\u4ea4\u3002", "\u9009\u62e9\u5b9e\u4f8b\uff1a\u4e73\u7cd6\u9176\u6301\u4e45\u6027\u5728\u6b27\u6d32\u548c\u975e\u6d32\u72ec\u7acb\u8d77\u6e90\uff1b\u80a4\u8272\u57fa\u56e0\uff08\u5982SLC24A5\u3001MC1R\uff09\u5728\u4e0d\u540c\u4eba\u7fa4\u53d7\u6b63\u9009\u62e9\u3002"], "summary_cn": "\u7fa4\u4f53\u9057\u4f20\u5b66\u6838\u5fc3\u5728\u4e8e\u7814\u7a76\u7531\u7a81\u53d8\u3001\u81ea\u7136\u9009\u62e9\u3001\u9057\u4f20\u6f02\u53d8\u548c\u57fa\u56e0\u6d41\u9a71\u52a8\u7684\u7b49\u4f4d\u57fa\u56e0\u9891\u7387\u53d8\u5316\uff0c\u54c8\u8fea-\u6e29\u4f2f\u683c\u5e73\u8861\u4f5c\u4e3a\u96f6\u5047\u8bbe\u3002\u4e2d\u6027\u7406\u8bba\u8ba4\u4e3a\u5927\u591a\u6570\u5206\u5b50\u8fdb\u5316\u6e90\u4e8e\u4e2d\u6027\u7a81\u53d8\u7684\u968f\u673a\u56fa\u5b9a\uff0c\u800c\u8fd1\u4e2d\u6027\u7406\u8bba\u5219\u8003\u8651\u4e86\u8f7b\u5fae\u6709\u5bb3\u6216\u6709\u5229\u7684\u7a81\u53d8\u3002Ka/Ks\u6bd4\u503c\u7528\u4e8e\u533a\u5206\u9009\u62e9\u7c7b\u578b\uff1a\u7b49\u4e8e1\u4e3a\u4e2d\u6027\uff0c\u5927\u4e8e1\u4e3a\u6b63\u9009\u62e9\uff0c\u5c0f\u4e8e1\u4e3a\u7eaf\u5316\u9009\u62e9\u3002\u5fae\u536b\u661f\u548c\u62f7\u8d1d\u6570\u53d8\u5f02\uff08CNV\uff09\u662f\u9057\u4f20\u53d8\u5f02\u7684\u91cd\u8981\u6765\u6e90\uff0c\u5fae\u536b\u661f\u56e0\u590d\u5236\u6ed1\u79fb\u5177\u6709\u9ad8\u7a81\u53d8\u7387\uff0c\u800cCNV\u5219\u4e0e\u8868\u578b\u591a\u6837\u6027\u548c\u75be\u75c5\u98ce\u9669\u76f8\u5173\u3002", "summary_en": "Population genetics studies allele frequency changes driven by mutation, natural selection, genetic drift, and gene flow, with Hardy-Weinberg equilibrium serving as a null hypothesis. The neutral theory posits that most molecular evolution results from random fixation of neutral mutations via drift, while the nearly neutral theory incorporates slightly deleterious or beneficial mutations. The Ka/Ks ratio distinguishes selection types: Ka/Ks=1 indicates neutrality, \u003e1 positive selection, and \u003c1 purifying selection. Microsatellites and copy number variants (CNVs) are key sources of genetic variation, with microsatellites having high mutation rates due to replication slippage and CNVs contributing to phenotypic diversity and disease risk.", "title_cn": "\u7fa4\u4f53\u57fa\u56e0\u7ec4\u5206\u6790", "title_en": "Population Genome Analysis"}, {"concepts": [{"definition_cn": "\u4ece\u8868\u578b\u51fa\u53d1\uff0c\u901a\u8fc7\u8bf1\u53d8\u548c\u7b5b\u9009\u6765\u9274\u5b9a\u6f5c\u5728\u9057\u4f20\u7a81\u53d8\u7684\u65b9\u6cd5\u3002", "definition_en": "An approach that starts with a phenotype and works toward identifying the underlying genetic mutation through mutagenesis and screening.", "formulas": [], "name_cn": "\u6b63\u5411\u9057\u4f20\u5b66", "name_en": "Forward genetics"}, {"definition_cn": "\u4f7f\u7528EMS\u6216ENU\u7b49\u5316\u5b66\u8bd5\u5242\uff0c\u901a\u8fc7\u70f7\u57fa\u5316\u6539\u53d8DNA\u78b1\u57fa\u7ed3\u6784\u6765\u8bf1\u5bfc\u7a81\u53d8\u3002", "definition_en": "Use of chemical agents like EMS or ENU to induce mutations by altering DNA base structure, often via alkylation.", "formulas": [], "name_cn": "\u5316\u5b66\u8bf1\u53d8", "name_en": "Chemical mutagenesis"}, {"definition_cn": "\u4e59\u57fa\u7532\u70f7\u78fa\u9178\u76d0\uff0c\u4e00\u79cd\u70f7\u5316\u5242\uff0c\u4ee5\u9ad8\u9891\u7387\uff08\u7ea6\u5343\u5206\u4e4b\u4e00\uff09\u8bf1\u5bfc\u70b9\u7a81\u53d8\uff0c\u65e0\u660e\u663e\u70ed\u70b9\u6216\u51b7\u70b9\u3002", "definition_en": "Ethylmethane sulfonate, an alkylating agent that causes point mutations at high frequency (~1 in 1000) with no obvious hotspots.", "formulas": [], "name_cn": "\u4e59\u57fa\u7532\u70f7\u78fa\u9178\u76d0", "name_en": "EMS"}, {"definition_cn": "N-\u4e59\u57fa-N-\u4e9a\u785d\u57fa\u8132\uff0c\u4e00\u79cd\u5f3a\u6548\u8bf1\u53d8\u5242\uff0c\u7528\u4e8e\u5c0f\u9f20\u548c\u6591\u9a6c\u9c7c\u7684\u6b63\u5411\u9057\u4f20\u7b5b\u9009\u3002", "definition_en": "N-ethyl-N-nitrosourea, a potent mutagen used in mouse and zebrafish for forward genetic screens.", "formulas": [], "name_cn": "N-\u4e59\u57fa-N-\u4e9a\u785d\u57fa\u8132", "name_en": "ENU"}, {"definition_cn": "\u5229\u7528\u8f6c\u5ea7\u5143\u4ef6\uff08\u5982\u679c\u8747P\u5143\u4ef6\u6216\u6591\u9a6c\u9c7cTol2\uff09\u63d2\u5165\u7834\u574f\u57fa\u56e0\uff0c\u4ea7\u751f\u7a81\u53d8\u3002", "definition_en": "Use of transposable elements like P element in Drosophila or Tol2 in zebrafish to disrupt genes and create mutations.", "formulas": [], "name_cn": "\u8f6c\u5ea7\u5b50 N"}, {"definition_cn": "\u5229\u7528Cas9\u6838\u9178\u9176\u548c\u5355\u94fe\u5f15\u5bfcRNA\u5728\u9776\u4f4d\u70b9\u4ea7\u751f\u53cc\u94fe\u65ad\u88c2\u7684\u57fa\u56e0\u7ec4\u7f16\u8f91\u5de5\u5177\u3002", "definition_en": "A genome editing tool using Cas9 nuclease guided by a single guide RNA to create double-strand breaks at target sites.", "formulas": [], "name_cn": "CRISPR/Cas9\u7cfb\u7edf", "name_en": "CRISPR/Cas9"}, {"definition_cn": "\u53ef\u5728\u57fa\u56e0\u7ec4\u5185\u79fb\u52a8\u7684\u53ef\u79fb\u52a8\u9057\u4f20\u5143\u4ef6\uff0c\u7528\u4e8e\u6b63\u5411\u9057\u4f20\u7b5b\u9009\u4e2d\u7684\u8bf1\u53d8\u3002", "definition_en": "A mobile genetic element that can move within the genome, used as a mutagen in forward genetic screens.", "formulas": [], "name_cn": "\u8f6c\u5ea7\u5b50", "name_en": "Transposon"}, {"definition_cn": "\u679c\u8747\u4e2d\u7684\u8f6c\u5ea7\u5b50\uff0c\u7528\u4e8e\u63d2\u5165\u8bf1\u53d8\u548c\u901a\u8fc7P\u5143\u4ef6\u8f6c\u5316\u8fdb\u884c\u8f6c\u57fa\u56e0\u3002", "definition_en": "A transposon in Drosophila used for insertional mutagenesis and transgenesis via P element transformation.", "formulas": [], "name_cn": "P\u5143\u4ef6", "name_en": "P element"}, {"definition_cn": "\u5c06\u91ce\u751f\u578b\u57fa\u56e0\u62f7\u8d1d\u5f15\u5165\u7a81\u53d8\u4f53\u540e\u6062\u590d\u6b63\u5e38\u8868\u578b\u7684\u5b9e\u9a8c\uff0c\u786e\u8ba4\u57fa\u56e0\u7684\u56e0\u679c\u5173\u7cfb\u3002", "definition_en": "An experiment where introducing a wild-type copy of a gene into a mutant restores normal phenotype, confirming gene causality.", "formulas": [], "name_cn": "\u62ef\u6551\u5b9e\u9a8c", "name_en": "Rescue experiment"}, {"definition_cn": "\u4e00\u79cd\u91cd\u6392\u67d3\u8272\u4f53\uff0c\u6291\u5236\u91cd\u7ec4\u5e76\u643a\u5e26\u663e\u6027\u6807\u8bb0\uff0c\u7528\u4e8e\u7ef4\u6301\u6742\u5408\u5b50\u4e2d\u7684\u81f4\u6b7b\u7a81\u53d8\u3002", "definition_en": "A rearranged chromosome that suppresses recombination and carries dominant markers, used to maintain lethal mutations in heterozygotes.", "formulas": [], "name_cn": "\u5e73\u8861\u67d3\u8272\u4f53", "name_en": "Balancer chromosome"}, {"definition_cn": "\u4ec5\u5728\u9650\u5236\u6e29\u5ea6\u4e0b\u663e\u793a\u8868\u578b\u7684\u7a81\u53d8\u4f53\uff0c\u5141\u8bb8\u5bf9\u5fc5\u9700\u57fa\u56e0\u8fdb\u884c\u6761\u4ef6\u6027\u7814\u7a76\u3002", "definition_en": "A mutant that shows a phenotype only at a restrictive temperature, allowing conditional study of essential genes.", "formulas": [], "name_cn": "\u6e29\u5ea6\u654f\u611f\u7a81\u53d8\u4f53", "name_en": "Temperature-sensitive mutant"}, {"definition_cn": "\u53ef\u6291\u5236\u7ec6\u80de\u6807\u8bb0\u7684\u5d4c\u5408\u5206\u6790\uff0c\u7528\u4e8e\u679c\u8747\u8c31\u7cfb\u8ffd\u8e2a\u548c\u514b\u9686\u5206\u6790\u7684\u6280\u672f\u3002", "definition_en": "Mosaic Analysis with a Repressible Cell Marker, a technique for lineage tracing and clonal analysis in Drosophila.", "formulas": [], "name_cn": "MARCM\u7cfb\u7edf", "name_en": "MARCM system"}, {"definition_cn": "MARCM\u7684\u53d8\u4f53\uff0c\u7528\u4e0d\u540c\u989c\u8272\u6807\u8bb0\u5206\u88c2\u7684\u4e24\u4e2a\u5b50\u7ec6\u80de\u4ee5\u8fdb\u884c\u8c31\u7cfb\u5206\u6790\u3002", "definition_en": "A variant of MARCM that labels both daughter cells of a division with different colors for lineage analysis.", "formulas": [], "name_cn": "\u53cc\u70b9MARCM", "name_en": "Twin-spot MARCM"}, {"definition_cn": "\u53cc\u6807\u8bb0\u5d4c\u5408\u5206\u6790\uff0c\u5728\u5c0f\u9f20\u4e2d\u4ea7\u751f\u548c\u53ef\u89c6\u5316\u9057\u4f20\u4e0a\u4e0d\u540c\u7684\u7ec6\u80de\u7684\u6280\u672f\u3002", "definition_en": "Mosaic Analysis with Double Markers, a technique to generate and visualize genetically distinct cells in mice.", "formulas": [], "name_cn": "\u5d4c\u5408\u5206\u6790\u53cc\u6807\u8bb0", "name_en": "MADM"}, {"definition_cn": "\u4f7f\u7528CRISPR/Cas9\u3001TALEN\u6216ZFN\u7b49\u5de5\u5177\u5bf9\u57fa\u56e0\u7ec4\u7279\u5b9aDNA\u5e8f\u5217\u8fdb\u884c\u7cbe\u786e\ 64c\u7684\u556e\u9f7f\u52a8\u7269\uff0c\u7528\u4e8e\u764c\u75c7\u548c\u8870\u8001\u7814\u7a76\u3002", "definition_en": "A long-lived, cancer-resistant rodent used as a model for cancer and aging research.", "formulas": [], "name_cn": "\u88f8\u9f39\u9f20", "name_en": "Naked mole rat"}, {"definition_cn": "\u5bbf\u4e3b\u751f\u7269\u4ece\u85fb\u7c7b\u4e2d\u83b7\u53d6\u53f6\u7eff\u4f53\u5e76\u6682\u65f6\u8fdb\u884c\u5149\u5408\u4f5c\u7528\u7684\u8fc7\u7a0b\u3002", "definition_en": "A process where a host organism sequesters chloroplasts from algae to perform photosynthesis temporarily.", "formulas": [], "name_cn": "\u76d7\u98df\u8d28\u4f53", "name_en": "Kleptoplasty"}], "formulas": [], "id": 12, "key_points": ["\u6b63\u5411\u9057\u4f20\u5b66\u4ece\u8868\u578b\u5230\u57fa\u56e0\uff0c\u53cd\u5411\u9057\u4f20\u5b66\u4ece\u57fa\u56e0\u5230\u8868\u578b\uff0c\u4e24\u8005\u4e92\u8865\u3002", "\u5316\u5b66\u8bf1\u53d8\uff08EMS/ENU\uff09\u548c\u8f6c\u5ea7\u5b50\u63d2\u5165\u662f\u6b63\u5411\u7b5b\u9009\u7684\u4e3b\u8981\u8bf1\u53d8\u65b9\u6cd5\u3002", "GAL4/UAS\u548cFLP/FRT\u7cfb\u7edf\u662f\u679c\u8747\u4e2d\u91cd\u8981\u7684\u57fa\u56e0\u8868\u8fbe\u548c\u514b\u9686\u5206\u6790\u5de5\u5177\u3002", "CRISPR/Cas9\u6280\u672f\u901a\u8fc7\u5f15\u5bfcRNA\u548cCas9\u6838\u9178\u9176\u5b9e\u73b0\u9ad8\u6548\u57fa\u56e0\u7f16\u8f91\u3002", "\u6a21\u5f0f\u751f\u7269\u9009\u62e9\u9700\u8003\u8651\u5bff\u547d\u3001\u9057\u4f20\u53ef\u64cd\u4f5c\u6027\u3001\u4e0e\u4eba\u7c7b\u76f8\u4f3c\u6027\u7b49\uff0c\u5982\u975e\u6d32\u9752\u9cc9\u9c7c\u7528\u4e8e\u8870\u8001\u7814\u7a76\u3002"], "summary_cn": "\u6b63\u5411\u9057\u4f20\u5b66\u662f\u4e00\u79cd\u4ece\u8868\u578b\u51fa\u53d1\u3001\u901a\u8fc7\u8bf1\u53d8\u548c\u7b5b\u9009\u9274\u5b9a\u76f8\u5173\u57fa\u56e0\u7684\u65b9\u6cd5\u3002\u4e3b\u8981\u8bf1\u53d8\u65b9\u6cd5\u5305\u62ec\u5316\u5b66\u8bf1\u53d8\u5242\uff08\u5982EMS\u548cENU\uff09\u8bf1\u5bfc\u70b9\u7a81\u53d8\uff0c\u4ee5\u53ca\u8f6c\u5ea7\u5b50\u63d2\u5165\u8bf1\u53d8\uff08\u5982\u679c\u8747P\u5143\u4ef6\u6216\u6591\u9a6c\u9c7cTol2\uff09\u3002\u4fee\u9970\u56e0\u5b50\u7b5b\u9009\u901a\u8fc7\u8bc6\u522b\u589e\u5f3a\u5b50\u6216\u6291\u5236\u5b50\u6765\u89e3\u6790\u9057\u4f20\u901a\u8def\u3002\u679c\u8747\u4e2d\u7684GAL4/UAS\u548cFLP/FRT\u7cfb\u7edf\u5206\u522b\u5b9e\u73b0\u7ec4\u7ec7\u7279\u5f02\u6027\u8868\u8fbe\u548c\u514b\u9686\u5206\u6790\uff0c\u800cCRISPR/Cas9\u6280\u672f\u4e3a\u53cd\u5411\u9057\u4f20\u5b66\u63d0\u4f9b\u4e86\u9ad8\u6548\u57fa\u56e0\u7f16\u8f91\u5de5\u5177\u3002\u6a21\u5f0f\u751f\u7269\u7684\u9009\u62e9\u9700\u8003\u8651\u5bff\u547d\u3001\u9057\u4f20\u53ef\u64cd\u4f5c\u6027\u548c\u4e0e\u4eba\u7c7b\u7684\u76f8\u4f3c\u6027\uff0c\u4f8b\u5982\u975e\u6d32\u9752\u9cc9\u9c7c\u5e38\u7528\u4e8e\u8870\u8001\u7814\u7a76\u3002", "summary_en": "Forward genetics is a phenotype-driven approach that identifies genes responsible for observable traits through mutagenesis and screening. Key mutagenesis methods include chemical agents like EMS and ENU, which induce point mutations at high frequencies, and transposable element insertional mutagenesis, such as using P elements in Drosophila or Tol2 in zebrafish. Modifier screens further dissect genetic pathways by identifying enhancers or suppressors that alter the original mutant phenotype. The GAL4/UAS and FLP/FRT systems in Drosophila enable tissue-specific gene expression and clonal analysis, respectively, while CRISPR/Cas9 has revolutionized reverse genetics with efficient gene editing. Model organism selection depends on factors like lifespan, genetic tractability, and relevance to human biology, exemplified by the African killifish for aging studies.", "title_cn": "\u9057\u4f20\u5b66\u7684\u7efc\u5408\u5e94\u7528\uff1a\u6a21\u5f0f\u751f\u7269\u7684\u9057\u4f20\u5206\u6790", "title_en": "Comprehensive Application of Genetics: Genetic Analysis in Model Organisms"}], "exercises": [{"file": "exercises/ch_01_practice.pdf", "id": "ex1", "tags": ["ch1"]}, {"file": "exercises/ch_02_practice.pdf", "id": "ex2", "tags": ["ch2"]}, {"file": "exercises/ch_04_practice.pdf", "id": "ex3", "tags": ["ch4"]}, {"file": "exercises/ch_05_practice.pdf", "id": "ex4", "tags": ["ch5"]}, {"file": "exercises/ch_07_practice.pdf", "id": "ex5", "tags": ["ch7"]}]};
  const chapters = DATA.chapters;
  
  // ---------- 进度管理 ----------
  const STORAGE_KEY = 'genetics_review_progress';
  let progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }

  function updateProgressBar() {
    const allChecks = document.querySelectorAll('.progress-check');
    const checked = document.querySelectorAll('.progress-check:checked');
    const pct = allChecks.length ? Math.round((checked.length / allChecks.length) * 100) : 0;
    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.textContent = pct + '%';
  }

  // ---------- 章节摘要 ----------
  function renderSummary(filterId = 'all') {
    const container = document.getElementById('summarySection');
    container.innerHTML = '';
    chapters.filter(ch => filterId === 'all' || ch.id == filterId).forEach(ch => {
      if (!ch.summary_cn) return;
      const html = `
        <div class="summary-text mb-3">
          <h5>📖 ${ch.title_cn} <small class="text-muted">${ch.title_en}</small></h5>
          <p class="mb-0">${ch.summary_cn}</p>
          <hr class="my-2">
          <small class="text-muted">${ch.summary_en}</small>
        </div>`;
      container.insertAdjacentHTML('beforeend', html);
    });
  }

  // ---------- 概念卡片 ----------
  function renderConcepts(filterId = 'all') {
    const container = document.getElementById('conceptsContainer');
    container.innerHTML = '';
    chapters.filter(ch => filterId === 'all' || ch.id == filterId).forEach(ch => {
      ch.concepts.forEach((concept, i) => {
        const conceptId = `c-${ch.id}-${i}`;
        const checked = progress[conceptId] ? 'checked' : '';
        const formulasHtml = concept.formulas.length
          ? concept.formulas.map(f => 
              `<span class="badge bg-light text-dark border me-1 mb-1">\\(${f}\\)</span>`
            ).join('')
          : '';
        const card = `
          <div class="col-md-6 col-lg-4 mb-4">
            <div class="card concept-card h-100 shadow-sm">
              <div class="card-body">
                <span class="badge bg-secondary mb-2">第${ch.id}章</span>
                <h5 class="card-title">${concept.name_cn}</h5>
                <h6 class="card-subtitle mb-2 text-muted">${concept.name_en}</h6>
                <p class="card-text">${concept.definition_cn}</p>
                <p class="text-muted small">${concept.definition_en}</p>
                ${formulasHtml ? '<div class="mt-2">' + formulasHtml + '</div>' : ''}
              </div>
              <div class="card-footer bg-transparent border-top">
                <div class="form-check">
                  <input class="form-check-input progress-check" type="checkbox" 
                         id="check-${conceptId}" data-id="${conceptId}" ${checked}>
                  <label class="form-check-label small" for="check-${conceptId}">✅ 已掌握</label>
                </div>
              </div>
            </div>
          </div>`;
        container.insertAdjacentHTML('beforeend', card);
      });
    });
    MathJax.typesetPromise();
  }

  // ---------- 公式表格 ----------
  function renderFormulas(filterId = 'all') {
    const tbody = document.getElementById('formulasBody');
    const noFormulas = document.getElementById('noFormulas');
    tbody.innerHTML = '';
    let hasFormulas = false;
    
    chapters.filter(ch => filterId === 'all' || ch.id == filterId).forEach(ch => {
      ch.formulas.forEach((fm, idx) => {
        hasFormulas = true;
        const fmId = `f-${ch.id}-${idx}`;
        const checked = progress[fmId] ? 'checked' : '';
        const row = `
          <tr class="formula-row">
            <td><span class="fw-bold formula-text">\\(\\displaystyle ${fm.latex}\\)</span></td>
            <td>
              <div>${fm.description_cn}</div>
              <small class="text-muted">${fm.description_en}</small>
            </td>
            <td>${fm.conditions || '—'}</td>
            <td class="text-center">
              <input class="form-check-input progress-check" type="checkbox" data-id="${fmId}" ${checked}>
            </td>
          </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
      });
    });
    
    document.getElementById('formulasTable').style.display = hasFormulas ? '' : 'none';
    noFormulas.style.display = hasFormulas ? 'none' : '';
    MathJax.typesetPromise();
  }

  // ---------- 必背提纲 ----------
  function renderKeyPoints(filterId = 'all') {
    const container = document.getElementById('keyPointsContainer');
    container.innerHTML = '';
    chapters.filter(ch => filterId === 'all' || ch.id == filterId).forEach(ch => {
      if (!ch.key_points || ch.key_points.length === 0) return;
      const ptsHtml = ch.key_points
        .filter(kp => kp && kp.trim())
        .map((kp, i) => {
          const kpId = `kp-${ch.id}-${i}`;
          const checked = progress[kpId] ? 'checked' : '';
          return `
            <div class="key-point d-flex align-items-start gap-2">
              <input class="form-check-input progress-check mt-1 flex-shrink-0" 
                     type="checkbox" data-id="${kpId}" ${checked}>
              <span>${kp}</span>
            </div>`;
        }).join('');
      container.innerHTML += `
        <div class="mb-4">
          <h5 class="text-primary">📌 ${ch.title_cn}</h5>
          ${ptsHtml}
        </div>`;
    });
  }

  // ---------- 事件绑定 ----------
  // 进度复选框
  document.addEventListener('change', function(e) {
    if (e.target.classList.contains('progress-check')) {
      const id = e.target.dataset.id;
      if (e.target.checked) {
        progress[id] = true;
      } else {
        delete progress[id];
      }
      saveProgress();
      updateProgressBar();
    }
  });

  // 章节切换
  document.getElementById('chapterTabs').addEventListener('click', function(e) {
    if (e.target.classList.contains('nav-link')) {
      // 更新 active 状态
      document.querySelectorAll('#chapterTabs .nav-link').forEach(btn => 
        btn.classList.remove('active'));
      e.target.classList.add('active');
      
      const chapterId = e.target.dataset.chapter;
      renderSummary(chapterId);
      renderConcepts(chapterId);
      renderFormulas(chapterId);
      renderKeyPoints(chapterId);
      updateProgressBar();
      
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  // 重置进度
  document.getElementById('resetProgress').addEventListener('click', function() {
    if (confirm('确定要重置所有学习进度吗？此操作不可撤销。')) {
      localStorage.removeItem(STORAGE_KEY);
      progress = {};
      // 重新渲染当前选中的章节
      const activeTab = document.querySelector('#chapterTabs .nav-link.active');
      const chapterId = activeTab ? activeTab.dataset.chapter : 'all';
      renderSummary(chapterId);
      renderConcepts(chapterId);
      renderFormulas(chapterId);
      renderKeyPoints(chapterId);
      updateProgressBar();
    }
  });

  // 暗色模式切换
  document.getElementById('toggleDark').addEventListener('click', function() {
    const html = document.documentElement;
    const current = html.getAttribute('data-bs-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    localStorage.setItem('theme', next);
  });

  // 恢复主题偏好
  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-bs-theme', savedTheme);
    }
  })();

  // ---------- 初始渲染 ----------
  renderSummary();
  renderConcepts();
  renderFormulas();
  renderKeyPoints();
  updateProgressBar();
</script>
</body>
</html>
